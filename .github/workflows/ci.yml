name: 🎮 LAN Board Game Online CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: 🔍 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Next.js Build Check
      run: npm run build
      env:
        # 這裡不需要真實的 API Key，僅供編譯時環境變數校驗通過
        GROQ_API_KEY: "ci_test_key"
        NEXT_PUBLIC_AI_PROVIDER: "groq"

    - name: 🚦 Server Start & Health Check
      run: |
        # Background run the server
        npm run dev &
        
        # Wait for the server to be ready
        echo "Waiting for server to start..."
        MAX_RETRIES=30
        COUNT=0
        until curl -s http://localhost:3000 > /dev/null || [ $COUNT -eq $MAX_RETRIES ]; do
          sleep 1
          COUNT=$((COUNT+1))
        done
        
        if [ $COUNT -eq $MAX_RETRIES ]; then
          echo "❌ Server failed to start within 30 seconds"
          exit 1
        else
          echo "✅ Server is UP and responding"
        fi

    - name: ✨ Lint Check
      run: npm run lint
