name: 🎮 LAN Board Game Online CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NEXT_TELEMETRY_DISABLED: 1

    steps:
    - name: 🔍 Checkout Repository
      uses: actions/checkout@v4

    - name: 🛠️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🏗️ Next.js Build Check
      run: npm run build
      env:
        GROQ_API_KEY: "ci_test_key"
        NEXT_PUBLIC_AI_PROVIDER: "groq"

    - name: 🚦 Server Start & Health Check
      run: |
        # 使用生產模式啟動服務，這比 dev 模式更穩定
        NODE_ENV=production node server.js &
        
        echo "Waiting for server to start (Max 60s)..."
        MAX_RETRIES=60
        COUNT=0
        until curl -s http://localhost:3000 > /dev/null || [ $COUNT -eq $MAX_RETRIES ]; do
          sleep 1
          COUNT=$((COUNT+1))
          if [ $((COUNT % 10)) -eq 0 ]; then
            echo "...still waiting ($COUNT/60s)"
          fi
        done
        
        if [ $COUNT -eq $MAX_RETRIES ]; then
          echo "❌ Server failed to start within 60 seconds"
          exit 1
        else
          echo "✅ Server is UP and responding"
        fi

    - name: ✨ Lint Check
      run: npm run lint
